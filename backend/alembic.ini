# alembic.ini  – Alembic configuration for SkillGenome X
# Place this file in the backend/ directory.

[alembic]
# path to migration scripts
script_location = migrations

# Template used to generate migration file names.
# %(rev)s  — revision id
# %(slug)s — auto-generated short description
file_template = %%(rev)s_%%(slug)s

# Prepend sys.path with this location when running env.py
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python-dateutil library.
timezone =

# max length of characters to apply to the "slug" field
truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command,
# regardless of whether or not the revision is "offline"
revision_environment = false

# set to 'true' to allow .pyc and .pyo files without source .py files
# to be detected as revisions in the versions/ directory
sourceless = false

# version location specification; this defaults
# to migrations/versions.  When using multiple version
# directories, initial revisions must be specified with --version-path.
version_locations = %(here)s/migrations/versions

# version path separator; As mentioned above, this is the character used to split
# version_locations. The default within new alembic.ini files is "os", which uses
# os.pathsep. Note that this means you cannot have a migration file with an
# os.pathsep character in the filename.
version_path_separator = os

# the output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# SQLAlchemy URL — overridden at runtime by env.py reading DATABASE_URL env var.
sqlalchemy.url = postgresql+psycopg2://skillgenome:skillgenome@localhost:5432/skillgenome


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using "black" - use the console_scripts runner, against the "black" entrypoint
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
