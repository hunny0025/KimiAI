[pytest]
# Root for test discovery
testpaths = tests

# backend/ on the sys.path so imports work without PYTHONPATH=.
pythonpath = .

# Show short, readable logs on failure
log_cli = true
log_cli_level = WARNING

# Friendly error output
addopts = -ra -q

# Test file patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*
